[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["**/*.enc"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Vite emits content-hashed JS/CSS under /assets/, so they can be cached
# forever. sw.js lives at the site root and never matches this rule, which
# avoids Netlify concatenating conflicting Cache-Control values.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The service worker must always be revalidated so clients pick up new deploys.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
